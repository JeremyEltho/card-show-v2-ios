version: "3.9"

# Optional: Use this when you're ready to move from SQLite to PostgreSQL.
# For local dev with SQLite, just run: cd backend && uvicorn main:app --reload

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pokescan
      POSTGRES_PASSWORD: pokescan_dev
      POSTGRES_DB: pokescan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokescan"]
      interval: 5s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pokescan:pokescan_dev@postgres:5432/pokescan
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
